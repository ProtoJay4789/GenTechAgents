jinn:
  version: "0.3.0"

gateway:
  port: 7777
  host: "127.0.0.1"

engines:
  default: claude
  claude:
    bin: claude
    model: opus
    effortLevel: medium
  codex:
    bin: codex
    model: gpt-5.4
    effortLevel: high

connectors:
  telegram:
    bots:
      - botToken: "${TELEGRAM_BOT_TOKEN_GENTECH}"
        employee: gentech
      - botToken: "${TELEGRAM_BOT_TOKEN_YOYO}"
        employee: yoyo
      - botToken: "${TELEGRAM_BOT_TOKEN_DMOB}"
        employee: dmob
    ignoreOldMessagesOnBoot: true

mcp:
  browser:
    enabled: true
    provider: playwright
  search:
    enabled: true
    provider: brave
    apiKey: "${BRAVE_API_KEY}"
  fetch:
    enabled: true
  gateway:
    enabled: true

sessions:
  maxDurationMinutes: 60
  maxCostUsd: 15.00

portal:
  language: English

logging:
  file: true
  stdout: true
  level: info
