jinn:
  version: "0.3.0"

gateway:
  port: 7777
  host: "127.0.0.1"

engines:
  default: claude
  claude:
    bin: claude
    model: opus
    effortLevel: medium
  codex:
    bin: codex
    model: gpt-5.4
    effortLevel: high

connectors:
  slack:
    shareSessionInChannel: false
    ignoreOldMessagesOnBoot: true

# MCP servers provide employees with browser, search, and messaging capabilities.
# These are injected automatically into Claude Code sessions via --mcp-config.
mcp:
  browser:
    enabled: true
    provider: playwright   # or "puppeteer"
  search:
    enabled: false         # Set to true and add apiKey or set BRAVE_API_KEY env var
    provider: brave
    # apiKey: ${BRAVE_API_KEY}
  fetch:
    enabled: true
  gateway:
    enabled: true          # Built-in MCP server for messaging, org, cron, sessions
  google:
    enabled: false          # Set to true after running: gws auth login
    # clientId: ${GOOGLE_CLIENT_ID}
    # clientSecret: ${GOOGLE_CLIENT_SECRET}
  agent-reach:
    enabled: false          # Set to true after running: agent-reach install --env=auto
    # venvPath: ~/.agent-reach-venv
  # custom:
  #   my-server:
  #     enabled: true
  #     command: npx
  #     args: ["-y", "@my/mcp-server"]
  #     env:
  #       API_KEY: ${MY_API_KEY}

# Session limits (can be overridden per-employee in their YAML)
sessions:
  maxDurationMinutes: 30
  maxCostUsd: 10.00

# Cron configuration
cron:
  # alertConnector: slack
  # alertChannel: "#alerts"

# CoinMarketCap configuration for cryptocurrency price tracking
# Get your free API key at: https://pro.coinmarketcap.com/
coinmarketcap:
  enabled: false          # Set to true to enable cryptocurrency price fetching
  # apiKey: ${COINMARKETCAP_API_KEY}  # Set COINMARKETCAP_API_KEY environment variable

# External integrations
integrations:
  paperclip:
    enabled: true           # Paperclip dashboard for agent orchestration & monitoring
    url: "http://127.0.0.1:3100"
    syncInterval: 60        # Push session/cost data every N seconds

portal:
  language: English

logging:
  file: true
  stdout: true
  level: info
